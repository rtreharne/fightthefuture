services:
  - type: web
    name: fightthefuture
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1
      - key: SQLITE_PATH
        value: /var/data/db.sqlite3
      - key: SECRET_KEY
        generateValue: true
      - key: TEACHER_PASSCODE
        value: teacher123
    disk:
      name: fightthefuture-data
      mountPath: /var/data
      sizeGB: 1
