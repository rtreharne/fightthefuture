<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    :root {
      --bg: #000000;
      --panel: #000000;
      --ink: #2cff2c;
      --accent: #2cff2c;
      --warn: #d8ff72;
      --ok: #63ff63;
      --err: #7dff7d;
      --line: #2cff2c;
      --muted: #9dff9d;
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --panel: #ffffff;
      --ink: #000000;
      --accent: #000000;
      --warn: #734e00;
      --ok: #0a5f0a;
      --err: #8f0000;
      --line: #000000;
      --muted: #444444;
    }
    body {
      margin: 0;
      font-family: "Courier New", Courier, monospace;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.35;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 14px 28px;
    }
    a { color: var(--accent); }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 12px;
      margin-bottom: 10px;
    }
    .panel h2, .panel h3 {
      margin-bottom: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .messages {
      list-style: none;
      padding: 0;
      margin: 0 0 10px 0;
    }
    .messages li {
      border-radius: 0;
      padding: 8px 10px;
      margin-bottom: 6px;
      border: 1px solid var(--line);
      background: var(--panel);
    }
    .messages li.success { border-color: var(--ok); color: var(--ok); }
    .messages li.error { border-color: var(--err); color: var(--err); }
    .messages li.info { border-color: var(--ink); color: var(--ink); }
    .grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    }
    form {
      display: grid;
      gap: 8px;
      align-items: start;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 6px;
      text-align: left;
      vertical-align: top;
    }
    th { font-weight: 700; }
    input, select, button {
      font: inherit;
      padding: 6px 8px;
      border-radius: 0;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--ink);
      width: 100%;
      min-height: 40px;
    }
    input[type="checkbox"] { width: auto; min-height: 0; }
    input:focus, select:focus, button:focus {
      outline: none;
      box-shadow: inset 0 0 0 1px var(--ink);
    }
    button {
      background: var(--bg);
      color: var(--ink);
      border: 1px solid var(--line);
      cursor: pointer;
    }
    button:hover {
      background: var(--ink);
      color: var(--bg);
    }
    button.alt {
      background: var(--bg);
      color: var(--ink);
      border-color: var(--line);
    }
    code {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 1px 5px;
    }
    .muted { color: var(--muted); }
    .list-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .badge {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 3px 8px;
      font-size: 12px;
    }
    .warning { color: var(--warn); }
    .table-scroll {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .table-scroll table {
      min-width: 680px;
    }
    .log-line {
      white-space: pre-wrap;
      word-break: break-word;
    }
    input[type="text"],
    input[type="password"],
    input[type="number"] {
      caret-color: var(--ink);
      caret-shape: block;
    }
    .theme-toggle-box {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      background: var(--panel);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1000;
      padding: 0;
    }
    .theme-toggle-box:hover {
      background: var(--ink);
      color: var(--bg);
    }
    .theme-toggle-box:focus {
      outline: none;
      box-shadow: inset 0 0 0 1px var(--ink);
    }
    .eye-icon {
      width: 14px;
      height: 8px;
      border: 1.5px solid currentColor;
      border-radius: 50% / 65%;
      position: relative;
      display: block;
    }
    .eye-icon::after {
      content: "";
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    @media (max-width: 720px) {
      body {
        font-size: 14px;
      }
      .wrap {
        padding: 10px 8px 18px;
      }
      .panel {
        padding: 9px;
      }
      .grid {
        grid-template-columns: 1fr;
      }
      th, td {
        padding: 5px;
      }
    }
  </style>
</head>
<body>
  <button id="theme-toggle" type="button" class="theme-toggle-box" aria-label="Switch color scheme" title="Switch color scheme">
    <span class="eye-icon" aria-hidden="true"></span>
  </button>
  <div class="wrap">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    {% block content %}{% endblock %}
    <footer style="margin-top: 18px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--line); padding-top: 8px;">
      Created by Rob Treharne, University of Liverpool &copy;, {% now "Y" %} |
      <a href="https://github.com/rtreharne/fightthefuture" target="_blank" rel="noopener noreferrer">GitHub Project</a>
    </footer>
  </div>
  <script>
    (function () {
      var key = "augur-theme";
      var root = document.documentElement;
      var button = document.getElementById("theme-toggle");
      if (!button) return;

      var saved = localStorage.getItem(key);
      if (saved === "light") {
        root.setAttribute("data-theme", "light");
      }

      button.addEventListener("click", function () {
        var isLight = root.getAttribute("data-theme") === "light";
        if (isLight) {
          root.removeAttribute("data-theme");
          localStorage.setItem(key, "dark");
        } else {
          root.setAttribute("data-theme", "light");
          localStorage.setItem(key, "light");
        }
      });
    })();
  </script>
</body>
</html>
