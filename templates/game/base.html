<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    :root {
      --bg: #000000;
      --panel: #000000;
      --ink: #2cff2c;
      --accent: #2cff2c;
      --warn: #d8ff72;
      --ok: #63ff63;
      --err: #7dff7d;
      --line: #2cff2c;
    }
    body {
      margin: 0;
      font-family: "Courier New", Courier, monospace;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.35;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 14px 28px;
    }
    a { color: var(--accent); }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 12px;
      margin-bottom: 10px;
    }
    .panel h2, .panel h3 {
      margin-bottom: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .messages {
      list-style: none;
      padding: 0;
      margin: 0 0 10px 0;
    }
    .messages li {
      border-radius: 0;
      padding: 8px 10px;
      margin-bottom: 6px;
      border: 1px solid var(--line);
      background: var(--panel);
    }
    .messages li.success { border-color: var(--ok); color: var(--ok); }
    .messages li.error { border-color: var(--err); color: var(--err); }
    .messages li.info { border-color: var(--ink); color: var(--ink); }
    .grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    }
    form {
      display: grid;
      gap: 8px;
      align-items: start;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 6px;
      text-align: left;
      vertical-align: top;
    }
    th { font-weight: 700; }
    input, select, button {
      font: inherit;
      padding: 6px 8px;
      border-radius: 0;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--ink);
      width: 100%;
      min-height: 40px;
    }
    input[type="checkbox"] { width: auto; min-height: 0; }
    input:focus, select:focus, button:focus {
      outline: none;
      box-shadow: inset 0 0 0 1px var(--ink);
    }
    button {
      background: var(--bg);
      color: var(--ink);
      border: 1px solid var(--line);
      cursor: pointer;
    }
    button:hover {
      background: var(--ink);
      color: var(--bg);
    }
    button.alt {
      background: var(--bg);
      color: var(--ink);
      border-color: var(--line);
    }
    code {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 1px 5px;
    }
    .muted { color: #9dff9d; }
    .list-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .badge {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 3px 8px;
      font-size: 12px;
    }
    .warning { color: var(--warn); }
    .table-scroll {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .table-scroll table {
      min-width: 680px;
    }
    .log-line {
      white-space: pre-wrap;
      word-break: break-word;
    }
    input[type="text"],
    input[type="password"],
    input[type="number"] {
      caret-color: var(--ink);
      caret-shape: block;
    }
    @media (max-width: 720px) {
      body {
        font-size: 14px;
      }
      .wrap {
        padding: 10px 8px 18px;
      }
      .panel {
        padding: 9px;
      }
      .grid {
        grid-template-columns: 1fr;
      }
      th, td {
        padding: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
