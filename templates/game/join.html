{% extends "game/base.html" %}

{% block content %}
<div class="panel">
  <h2 style="margin-top: 0;">Join Current Run</h2>
  {% if run %}
    <p>Run: <strong>{{ run.name }}</strong> | Status: <strong>{{ run.get_status_display }}</strong></p>
  {% else %}
    <p class="warning">No current run exists. Ask teacher to start one.</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <label for="username">User name</label>
    <input id="username" name="username" type="text" maxlength="80" required placeholder="treharne">
    <button type="submit">Enter Game</button>
  </form>
</div>

{% endblock %}
