services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fightthefuture}
      POSTGRES_USER: ${POSTGRES_USER:-fightthefuture}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fightthefuture}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fightthefuture} -d ${POSTGRES_DB:-fightthefuture}"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - .:/app
    ports:
      - "8008:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
